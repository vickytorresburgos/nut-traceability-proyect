# Rate limiting zones
# - api_limit:  máx 30 req/s por IP para endpoints generales
# - ocr_limit:  máx 5 req/s por IP para endpoints OCR (CPU-intensivo)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ocr_limit:10m  rate=5r/s;

upstream nut_api {
    server nut-api:8080;
    keepalive 16;   # conexiones keep-alive hacia el backend
}

server {
    listen 80;
    server_name _;

    # ── Whitelist de Acceso ────────────────────────────────────────────────
    # Solo las IPs en esta lista podrán acceder a la API o al Dashboard.
    allow 127.0.0.1;        # Permite localhost (interno)
    allow 172.16.0.0/12;    # Permite la red interna de Docker
    allow 192.168.100.0/24; # Permite red local Wi-Fi
    # allow X.X.X.X;        # <--- Agregá aquí tu IP pública si accedés remotamente
    deny all;               # BLOQUEA al resto del mundo
    # ───────────────────────────────────────────────────────────────────────

    # Tamaño máximo de upload (imágenes del móvil ~5-10MB)
    client_max_body_size 15M;

    # Timeouts — generosos para el pipeline OCR (hasta 130s en cascada)
    proxy_connect_timeout   10s;
    proxy_read_timeout     130s;
    proxy_send_timeout      30s;

    # Headers estándar de proxy inverso
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Pasar headers custom del móvil (idempotencia I4)
    proxy_pass_request_headers on;

    # ── Endpoints OCR — rate limiting agresivo (CPU-intensivo) ────────────
    location /ocr/ {
        limit_req zone=ocr_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://nut_api;
        proxy_read_timeout 130s;
    }

    # ── API general ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://nut_api;
    }

    # ── Swagger UI / Documentación ─────────────────────────────────────────
    location ~ ^/(docs|openapi.json) {
        proxy_pass http://nut_api;
    }

    # ── Dashboard (archivos estáticos servidos desde nut-api) ─────────────
    location /dashboard/ {
        proxy_pass http://nut_api;
    }

    # ── Health check — sin rate limiting, sin logs (para monitores externos)
    location = /health {
        proxy_pass   http://nut_api;
        access_log   off;
    }

    # ── Bloquear acceso directo a rutas de administración internas ─────────
    location ~* ^/(admin|minio|postgres|pgadmin) {
        return 403;
    }

    # ── Respuesta para errores de rate limiting ────────────────────────────
    error_page 429 @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"detail":"Demasiadas solicitudes. Intentá nuevamente en unos segundos."}';
    }
}
