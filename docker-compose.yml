services:
  postgres:
    image: postgres:16-alpine
    container_name: nut-postgres
    environment:
      POSTGRES_DB: nut_notary
      POSTGRES_USER: notary
      POSTGRES_PASSWORD: notary123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U notary -d nut_notary" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nut-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: nut-ocr
    ports:
      - "8082:8081"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/ocr/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  nut-api:
    build:
      context: ./nut-api
      dockerfile: Dockerfile
    container_name: nut-api
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: nut_notary
      POSTGRES_USER: notary
      POSTGRES_PASSWORD: notary123
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: nut-images
      OCR_SERVICE_HOST: ocr-service
      OCR_SERVICE_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ocr-service:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
